<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Meta Ads — TANOS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root{--bg:#0a0a0a;--s:#111;--s2:#1a1a1a;--b:#222;--ac:#ff4d00;--ac2:#ffaa00;--gr:#00c97a;--rd:#ff3b3b;--tx:#e8e8e8;--mt:#666;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:var(--sans)}
header{border-bottom:1px solid var(--b);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--ac)}.logo span{color:var(--mt)}
.ts{font-family:var(--mono);font-size:11px;color:var(--mt)}
main{padding:32px;max-width:1400px;margin:0 auto}
.sl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--mt);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--b)}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;background:var(--b);border:1px solid var(--b);margin-bottom:32px}
.kp{background:var(--s);padding:24px 20px;position:relative;overflow:hidden}
.kp::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac);transform:scaleX(0);transform-origin:left;transition:transform .6s ease}
.kp.ok::before{transform:scaleX(1)}
.kl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--mt);margin-bottom:12px}
.kv{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1}
.kv.g{color:var(--gr)}.kv.w{color:var(--ac2)}.kv.r{color:var(--rd)}
.ks{font-family:var(--mono);font-size:11px;color:var(--mt);margin-top:6px}
.tw{background:var(--s);border:1px solid var(--b);overflow-x:auto;margin-bottom:32px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--mt);padding:14px 16px;text-align:left;border-bottom:1px solid var(--b);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--tx)}
tbody tr{border-bottom:1px solid var(--b);transition:background .15s}
tbody tr:last-child{border-bottom:none}tbody tr:hover{background:var(--s2)}
td{padding:12px 16px;font-family:var(--mono);font-size:12px;white-space:nowrap}
td.nm{font-family:var(--sans);font-size:13px;font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.sb{display:inline-block;padding:3px 8px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border-radius:2px}
.sACTIVE{background:rgba(0,201,122,.15);color:var(--gr)}.sPAUSED{background:rgba(102,102,102,.15);color:var(--mt)}.sARCHIVED{background:rgba(102,102,102,.1);color:#444}
.mg{color:var(--gr)}.mr{color:var(--rd)}.mw{color:var(--ac2)}.me{color:var(--b)}
.fb{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fn{background:var(--s);border:1px solid var(--b);color:var(--mt);padding:6px 14px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.fn:hover,.fn.on{border-color:var(--ac);color:var(--ac)}
.si{background:var(--s);border:1px solid var(--b);color:var(--tx);padding:6px 14px;font-family:var(--mono);font-size:11px;outline:none;width:200px}
.si:focus{border-color:var(--ac)}.si::placeholder{color:var(--mt)}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:32px}
.rc{background:var(--s);border:1px solid var(--b);padding:20px;position:relative}
.rc::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px}
.rc.ph::before{background:var(--rd)}.rc.pm::before{background:var(--ac2)}.rc.pl::before{background:var(--gr)}
.rh{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.rn{font-size:13px;font-weight:500;line-height:1.3}
.rp{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:3px 7px;border-radius:2px;flex-shrink:0}
.ph .rp{background:rgba(255,59,59,.15);color:var(--rd)}.pm .rp{background:rgba(255,170,0,.15);color:var(--ac2)}.pl .rp{background:rgba(0,201,122,.15);color:var(--gr)}
.rm{display:flex;gap:16px;margin-bottom:12px;padding:10px;background:var(--bg);border:1px solid var(--b)}
.rml{font-family:var(--mono);font-size:11px}.rmll{color:var(--mt);display:block;font-size:9px;letter-spacing:.1em;text-transform:uppercase}.rmlv{color:var(--tx);font-weight:600}
.ra{list-style:none}.ra li{font-size:12px;color:#aaa;padding:4px 0 4px 14px;position:relative;line-height:1.5}
.ra li::before{content:'→';position:absolute;left:0;color:var(--mt);font-family:var(--mono)}
#ld{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.lt{font-family:var(--mono);font-size:13px;color:var(--mt);letter-spacing:.1em}
.lr{width:40px;height:2px;background:var(--b);position:relative;overflow:hidden}
.lr::after{content:'';position:absolute;top:0;left:-40px;width:40px;height:100%;background:var(--ac);animation:ld 1s linear infinite}
@keyframes ld{to{left:40px}}
#ct{display:none}.nd{text-align:center;padding:40px;font-family:var(--mono);font-size:12px;color:var(--mt)}
.cl{font-family:var(--mono);font-size:11px;color:var(--mt);margin-left:auto}
</style></head><body>
<header><div class="logo">Meta Ads <span>/</span> TANOS T45 LC</div><div class="ts" id="ts">—</div></header>
<div id="ld"><div class="lr"></div><div class="lt">carregando dados...</div></div>
<main id="ct">
<div class="sl" style="margin-bottom:16px">Visão Geral</div>
<div class="kg" id="kg"></div>
<div class="sl">Campanhas</div>
<div class="fb">
<button class="fn on" onclick="fs('all',this)">Todas</button>
<button class="fn" onclick="fs('ACTIVE',this)">Ativas</button>
<button class="fn" onclick="fs('PAUSED',this)">Pausadas</button>
<input class="si" type="text" placeholder="Buscar..." oninput="fq(this.value)">
<span class="cl" id="cl"></span></div>
<div class="tw"><table><thead><tr>
<th onclick="st('name')">Campanha</th><th onclick="st('status')">Status</th>
<th onclick="st('spend')">Gasto</th><th onclick="st('impressions')">Impressões</th>
<th onclick="st('clicks')">Cliques</th><th onclick="st('ctr')">CTR</th>
<th onclick="st('cpc')">CPC</th><th onclick="st('cpm')">CPM</th>
<th onclick="st('frequency')">Freq.</th><th onclick="st('leads')">Leads</th>
<th onclick="st('cpl')">CPL</th>
</tr></thead><tbody id="tb"></tbody></table></div>
<div class="sl">Recomendações</div>
<div class="rg" id="rg"></div>
</main>
<script>
let all=[],cf='all',cq='',sk='spend',sd=-1;
async function load(){
  try{
    const r=await fetch('data.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    render(d);
  }catch(e){
    document.getElementById('ld').innerHTML='<div style="padding:32px;font-family:var(--mono);color:var(--rd)">Erro: '+e.message+'<br><br>Rode node fetch.js primeiro.</div>';
  }
}
function fmt(v,t){
  if(!v&&v!==0)return '<span class="me">—</span>';
  if(v===0&&t!=='n')return '<span class="me">—</span>';
  if(t==='r')return 'R$ '+Number(v).toFixed(2).replace('.',',');
  if(t==='p')return Number(v).toFixed(2)+'%';
  if(t==='n')return Number(v).toLocaleString('pt-BR');
  if(t==='d')return Number(v).toFixed(1);
  return v;
}
function cctr(v){return v>=2?'mg':v>=1?'':'mr'}
function ccpc(v){return v<=1?'mg':v<=3?'mw':'mr'}
function ccpl(v){if(!v||v===0)return 'me';return v<=10?'mg':v<=25?'mw':'mr'}
function cfreq(v){return v<=2?'mg':v<=4?'mw':'mr'}
function render(d){
  document.getElementById('ld').style.display='none';
  document.getElementById('ct').style.display='block';
  document.getElementById('ts').textContent='Gerado: '+new Date(d.generated_at).toLocaleString('pt-BR');
  all=d.campaigns||[];
  const cs=all.filter(c=>c.spend>0);
  const ts=all.reduce((s,c)=>s+c.spend,0);
  const tl=all.reduce((s,c)=>s+c.leads,0);
  const ti=all.reduce((s,c)=>s+c.impressions,0);
  const tc=all.reduce((s,c)=>s+c.clicks,0);
  const actr=cs.length?cs.reduce((s,c)=>s+c.ctr,0)/cs.length:0;
  const acpc=cs.length?cs.reduce((s,c)=>s+c.cpc,0)/cs.length:0;
  const acpm=cs.length?cs.reduce((s,c)=>s+c.cpm,0)/cs.length:0;
  const acpl=tl>0?ts/tl:0;
  const kps=[
    {l:'Gasto Total',v:'R$ '+ts.toFixed(2).replace('.',','),s:'todo o período',c:''},
    {l:'Leads',v:tl.toLocaleString('pt-BR'),s:'total gerado',c:tl>0?'g':''},
    {l:'CPL Médio',v:acpl?'R$ '+acpl.toFixed(2).replace('.',','):'—',s:'custo por lead',c:acpl&&acpl<=10?'g':acpl<=25?'w':'r'},
    {l:'CTR Médio',v:actr?actr.toFixed(2)+'%':'—',s:'taxa de clique',c:actr>=2?'g':actr>=1?'':'r'},
    {l:'CPC Médio',v:acpc?'R$ '+acpc.toFixed(2).replace('.',','):'—',s:'custo por clique',c:''},
    {l:'CPM Médio',v:acpm?'R$ '+acpm.toFixed(2).replace('.',','):'—',s:'por 1k impressões',c:''},
    {l:'Impressões',v:ti.toLocaleString('pt-BR'),s:'total',c:''},
    {l:'Campanhas',v:all.filter(c=>c.status==='ACTIVE').length+' / '+all.length,s:'ativas / total',c:''},
  ];
  document.getElementById('kg').innerHTML=kps.map(k=>'<div class="kp ok"><div class="kl">'+k.l+'</div><div class="kv '+k.c+'">'+k.v+'</div><div class="ks">'+k.s+'</div></div>').join('');
  renderTable();renderRecs();
}
function renderTable(){
  let cs=all.filter(c=>{
    const ms=cf==='all'||c.status===cf;
    const mq=!cq||c.name.toLowerCase().includes(cq.toLowerCase());
    return ms&&mq;
  });
  cs.sort((a,b)=>{
    const av=sk==='name'||sk==='status'?a[sk]||'':(a[sk]||0);
    const bv=sk==='name'||sk==='status'?b[sk]||'':(b[sk]||0);
    return av<bv?sd:av>bv?-sd:0;
  });
  document.getElementById('cl').textContent=cs.length+' campanha'+(cs.length!==1?'s':'');
  const mx=Math.max(...cs.map(c=>c.spend||0));
  document.getElementById('tb').innerHTML=cs.length===0?'<tr><td colspan="11" class="nd">Nenhuma campanha</td></tr>':cs.map(c=>`
  <tr>
    <td class="nm" title="${c.name}">${c.name}</td>
    <td><span class="sb s${c.status}">${c.status}</span></td>
    <td>${fmt(c.spend,'r')}</td>
    <td>${fmt(c.impressions,'n')}</td>
    <td>${fmt(c.clicks,'n')}</td>
    <td class="${cctr(c.ctr)}">${fmt(c.ctr,'p')}</td>
    <td class="${ccpc(c.cpc)}">${fmt(c.cpc,'r')}</td>
    <td>${fmt(c.cpm,'r')}</td>
    <td class="${cfreq(c.frequency)}">${fmt(c.frequency,'d')}</td>
    <td class="${c.leads>0?'mg':''}">${fmt(c.leads,'n')}</td>
    <td class="${ccpl(c.cpl)}">${fmt(c.cpl,'r')}</td>
  </tr>`).join('');
}
function rec(c){
  const a=[];let p='l';
  if(!c.spend||c.spend===0){return{p:'l',a:c.status==='ACTIVE'?['Ativa sem gasto — verificar criativos e público']:['Sem dados suficientes']};}
  if(c.ctr<1&&c.impressions>5000){a.push('CTR '+c.ctr.toFixed(2)+'% abaixo de 1% — testar novos criativos');p='h';}
  else if(c.ctr>=2){a.push('CTR '+c.ctr.toFixed(2)+'% forte — escalar budget 20-30%');}
  if(c.frequency>4){a.push('Frequência '+c.frequency.toFixed(1)+' — público saturado, expandir audiência');p='h';}
  else if(c.frequency>2.5){a.push('Frequência '+c.frequency.toFixed(1)+' — monitorar queda de CTR');if(p!=='h')p='m';}
  if(c.leads>0){
    if(c.cpl>25){a.push('CPL R$ '+c.cpl.toFixed(2)+' alto — revisar segmentação e LP');p='h';}
    else if(c.cpl<=10){a.push('CPL R$ '+c.cpl.toFixed(2)+' excelente — candidata para escalar');}
  } else if(c.clicks>50){a.push(c.clicks+' cliques sem leads — checar pixel e LP');p='h';}
  if(c.cpc>3){a.push('CPC R$ '+c.cpc.toFixed(2)+' elevado — revisar relevância do criativo');if(p==='l')p='m';}
  if(a.length===0)a.push('Métricas dentro do esperado — monitoramento semanal');
  return{p,a};
}
function renderRecs(){
  const cs=all.filter(c=>c.spend>0||c.status==='ACTIVE');
  const ord={h:0,m:1,l:2};
  const wr=cs.map(c=>({...c,rec:rec(c)})).sort((a,b)=>ord[a.rec.p]-ord[b.rec.p]);
  document.getElementById('rg').innerHTML=wr.map(c=>`
  <div class="rc p${c.rec.p}">
    <div class="rh"><div class="rn">${c.name}</div><div class="rp">${c.rec.p==='h'?'Urgente':c.rec.p==='m'?'Atenção':'OK'}</div></div>
    <div class="rm">
      <div class="rml"><span class="rmll">Gasto</span><span class="rmlv">${c.spend?'R$ '+c.spend.toFixed(0):'—'}</span></div>
      <div class="rml"><span class="rmll">Leads</span><span class="rmlv">${c.leads||0}</span></div>
      <div class="rml"><span class="rmll">CPL</span><span class="rmlv">${c.cpl?'R$ '+c.cpl.toFixed(2):'—'}</span></div>
      <div class="rml"><span class="rmll">CTR</span><span class="rmlv">${c.ctr?c.ctr.toFixed(2)+'%':'—'}</span></div>
      <div class="rml"><span class="rmll">Freq.</span><span class="rmlv">${c.frequency?c.frequency.toFixed(1):'—'}</span></div>
    </div>
    <ul class="ra">${c.rec.a.map(x=>'<li>'+x+'</li>').join('')}</ul>
  </div>`).join('');
}
function fs(s,b){cf=s;document.querySelectorAll('.fn').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderTable();}
function fq(v){cq=v;renderTable();}
function st(k){if(sk===k)sd*=-1;else{sk=k;sd=-1;}renderTable();}
load();
</script></body></html>
